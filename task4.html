<!DOCTYPE html>
<html>
<head>
    <title>JavaScript DOM Demo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            margin-top: 100px;
        }

        .box {
            background-color: white;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 15px gray;
        }

        h2 {
            color: #333;
        }

        button {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2 id="msg">🌟 Welcome to JavaScript!</h2>

        <button onclick="changeText()">
            Click Me
        </button>
    </div>

    <script>
        function changeText()
        {
            alert("🎉 Button Clicked Successfully!");

            document.getElementById("msg").innerText =
                "🚀 Text Changed Using DOM!";

            document.body.style.background =
                "linear-gradient(to right, #ff9a9e, #fad0c4)";
        }
    </script>

</body>
</html>
